# ============================================================
# EXERCISE 2: Multi-Version Testing + Code Quality
# ============================================================
# Goal: Test on multiple Python versions AND check code quality.
#
# What you'll learn:
#   - Matrix strategy (test across multiple versions in parallel)
#   - Multiple jobs in one workflow
#   - Linting with Ruff (a fast Python linter)
#   - Why a lint failure is a GOOD thing (catch bugs early!)
#
# Instructions:
#   1. Replace your .github/workflows/ci.yml with this file
#   2. Push to GitHub
#   3. Watch the Actions tab — you'll see MULTIPLE jobs running!
#   4. Try: Break the code style intentionally, push, see it fail
#   5. Fix it, push again, see it pass
#
# ============================================================

name: CI - Test & Lint

on:
  push:
  pull_request:

jobs:
  # ─── JOB 1: Run tests on multiple Python versions ──────────
  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest

    # MATRIX: Run this job once per Python version — in parallel!
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      # CACHING: Don't re-download packages every time
      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        run: pytest --verbose

  # ─── JOB 2: Check code quality ─────────────────────────────
  lint:
    name: Code Quality
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Ruff
        run: pip install ruff

      # Ruff checks: style errors, unused imports, common bugs
      - name: Check code style
        run: ruff check .

      # Ruff format: is the code properly formatted?
      - name: Check formatting
        run: ruff format --check .
